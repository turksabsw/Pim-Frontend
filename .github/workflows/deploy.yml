name: Deploy to GitHub Pages

on:
  # main'e her push'ta otomatik deploy
  push:
    branches: [main]
  # Actions sekmesinden elle tetikleme
  workflow_dispatch:

# GITHUB_TOKEN'a Pages'e deploy izni ver
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek deploy; devam eden run'ları iptal etmeden kuyruğa al
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Doğrudan vite build; `npm run build` içindeki vue-tsc type-check'i
      # deploy'u bloklamasın diye atlanıyor (projede önceden var olan tip hataları var).
      - name: Build
        run: npx vite build

      # SPA history-mode fallback: derin route'lar (ör. /products) yenilendiğinde
      # GitHub Pages 404 döner. index.html'i 404.html olarak kopyalayınca router devralır.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
