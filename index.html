<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="only light" />
    <meta name="darkreader-lock" />
    <title>PIM - Product Information Management</title>
    <script>
      // Apply theme ASAP — "only light" or "only dark" prevents browser auto-darkening
      (function() {
        var saved = localStorage.getItem('pim-theme');
        var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', dark);
        // "only light" = browser must NOT auto-darken; "only dark" = browser must NOT auto-lighten
        document.documentElement.style.colorScheme = dark ? 'only dark' : 'only light';
        document.querySelector('meta[name="color-scheme"]').content = dark ? 'only dark' : 'only light';
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-white text-gray-900 antialiased dark:bg-gray-900 dark:text-white">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
